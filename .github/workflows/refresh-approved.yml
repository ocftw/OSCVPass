name: Refresh approved metadata

# 讓「已核准專案」頁面能無人管理地自我更新：
# 定期從 GitHub / GitLab 重新抓取 star / fork / 最後更新日 / 授權，
# 重新排序後，有變更才提交並推到 mkdoc 觸發既有的 Build Docs 部署。
on:
  schedule:
    # 每週日 20:00 UTC（＝週一 04:00 台灣時間）執行一次
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

# 避免排程與手動觸發同時跑造成 push 競爭
concurrency:
  group: refresh-approved
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Refresh metadata from GitHub / GitLab
        working-directory: src/site_docs
        env:
          # 內建 token 提供 5000 req/hr 的 github.com API 額度，約數百筆綽綽有餘
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/update_approved_from_vcs.py --write --no-progress

      - name: Commit and deploy when changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'toomore@ocf.tw'
          if [ -z "$(git status --porcelain)" ]; then
            echo "沒有 metadata 變更，略過部署。"
            exit 0
          fi
          git add -A
          git commit -m 'chore: refresh approved metadata'
          # main 為內容真實來源；推到 mkdoc 觸發既有 Build Docs 部署
          git push origin HEAD:main
          git push origin HEAD:mkdoc
